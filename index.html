<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngaSafi | Indigenous Tech</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --emerald: #064E3B;
            --leaf: #10B981;
            --cream: #F9FAFB;
        }
        body {
            background: radial-gradient(circle at center, #065F46, var(--emerald));
            color: var(--cream);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            max-width: 500px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .slogan {
            font-size: 1.1rem;
            color: var(--leaf);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 600;
        }
        .vision-text {
            margin-top: 2rem;
            font-style: italic;
            opacity: 0.8;
            line-height: 1.6;
        }
        .status-badge {
            margin-top: 2rem;
            display: inline-block;
            padding: 8px 20px;
            border: 1px solid var(--gold);
            border-radius: 50px;
            color: var(--gold);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AngaSafi</h1>
        <p class="slogan">Ancestral Truth • Modern Logic</p>
        <p class="vision-text">"The replicatable nativity of modern technology, harmonized with indigenous knowledge for global scalability."</p>
        <div class="status-badge">System: Fully Automated</div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
