<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngaSafi | Field Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --emerald: #064E3B; --leaf: #10B981; --cream: #F9FAFB; }
        body { background: radial-gradient(circle at center, #065F46, var(--emerald)); color: var(--cream); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { padding: 2rem; width: 90%; max-width: 450px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.8rem; margin: 0; }
        .slogan { display: block; font-size: 1rem; color: var(--gold); margin: 10px 0 25px 0; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        .card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(12px); border: 1.5px solid var(--gold); padding: 1.5rem; border-radius: 24px; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        
        select, input { width: 90%; padding: 12px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(0,0,0,0.3); color: white; font-size: 1rem; margin-top: 10px; outline: none; }
        
        /* The Uniform Glow Box */
        .result-area { 
            margin-top: 25px; 
            padding: 20px; 
            background: rgba(16, 185, 129, 0.1); 
            border-radius: 15px; 
            border: 2px solid var(--leaf);
            box-shadow: 0 0 15px var(--leaf), inset 0 0 10px var(--leaf); /* Uniform Neon Glow */
        }
        
        .value { font-size: 2.5rem; color: var(--gold); font-weight: 700; display: block; }
        .btn-log { background: var(--gold); color: var(--emerald); border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; text-transform: uppercase; }
        .history { margin-top: 40px; text-align: left; width: 100%; }
        .log-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
    </style>
</head>
<body>
    <div class="container">
        <h1>AngaSafi</h1>
        <div class="slogan">Ancestral Wisdom, Digitally Scaled.</div>
        
        <div class="card">
            <p style="font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; margin:0;">Asset Selection</p>
            <select id="assetType">
                <option value="tree">Tree (Diameter/DBH)</option>
                <option value="soil">Soil (Carbon/Hectare)</option>
                <option value="mangrove">Mangrove (Blue Carbon)</option>
            </select>
            
            <input type="number" id="inputVal" placeholder="Enter measurement" oninput="calculate()">
            
            <div class="result-area">
                <span style="font-size: 0.7rem; text-transform: uppercase; opacity: 0.7;">Carbon Sequestered</span>
                <span id="output" class="value">0.00</span>
                <span style="font-size: 0.9rem; color: var(--leaf); font-weight: 600;">kg CO2e</span>
            </div>
            
            <button class="btn-log" onclick="logData()">Record Field Audit</button>
        </div>

        <div class="history" id="history">
            <p style="color: var(--gold); font-weight: bold; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 5px;">Audit Trail</p>
        </div>
    </div>

    <script>
        function calculate() {
            const val = document.getElementById('inputVal').value;
            const type = document.getElementById('assetType').value;
            let res = 0;
            
            if (val > 0) {
                if (type === 'tree') {
                    res = (0.11 * Math.pow(val, 2.62)) * 0.5 * 3.66;
                } else if (type === 'soil') {
                    res = val * 2.5; // Placeholder soil logic
                } else {
                    res = val * 1.8; // Placeholder blue carbon
                }
                document.getElementById('output').innerText = res.toFixed(2);
            } else {
                document.getElementById('output').innerText = "0.00";
            }
        }

        function logData() {
            const val = document.getElementById('output').innerText;
            if (val == "0.00") return;
            navigator.geolocation.getCurrentPosition((pos) => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<b>${new Date().toLocaleTimeString()}</b> • GPS: ${pos.coords.latitude.toFixed(4)}<br>Captured: ${val} kg CO2e`;
                document.getElementById('history').prepend(item);
            }, () => alert("GPS Auth Required."));
        }
    </script>
</body>
</html>
