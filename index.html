<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngaSafi | Global Biome Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --emerald: #064E3B; --leaf: #10B981; --cream: #F9FAFB; }
        body { background: radial-gradient(circle at center, #065F46, var(--emerald)); color: var(--cream); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { padding: 2rem; width: 90%; max-width: 450px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.8rem; margin: 0; }
        .slogan { display: block; font-size: 0.9rem; color: var(--gold); margin: 5px 0 20px 0; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(12px); border: 1.5px solid var(--gold); padding: 1.5rem; border-radius: 24px; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        input, .kingdom-display { width: 90%; padding: 12px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(0,0,0,0.3); color: white; font-size: 1rem; margin-top: 10px; outline: none; }
        .kingdom-display { background: rgba(212, 175, 55, 0.1); border: 1.5px dashed var(--gold); color: var(--gold); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; display: flex; align-items: center; justify-content: center; min-height: 45px; }
        .result-area { margin-top: 25px; padding: 20px; background: rgba(16, 185, 129, 0.1); border-radius: 15px; border: 2px solid var(--leaf); box-shadow: 0 0 20px var(--leaf), inset 0 0 10px var(--leaf); }
        .value { font-size: 2.5rem; color: var(--gold); font-weight: 700; display: block; }
        .btn-log { background: var(--gold); color: var(--emerald); border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; text-transform: uppercase; }
        .log-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--gold); font-size: 0.85rem; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AngaSafi</h1>
        <div class="slogan">Ancestral Wisdom, Digitally Scaled.</div>
        <div class="card">
            <p style="font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; margin:0;">Universal Species Search</p>
            <input type="text" id="assetSearch" placeholder="Avocado, Puffin, Mango, etc..." oninput="smartResolve()">
            
            <p style="font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; margin: 15px 0 0 0;">Kingdom Resolved</p>
            <div id="kingdomDisplay" class="kingdom-display">Awaiting...</div>

            <p style="font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; margin: 15px 0 0 0;">Metric Value</p>
            <input type="number" id="inputVal" placeholder="Enter measurement" oninput="calculate()">
            
            <div class="result-area">
                <span id="output" class="value">0.00</span>
                <span style="font-size: 0.9rem; color: var(--leaf); font-weight: 600;">kg CO2e Sequestration</span>
            </div>
            <button class="btn-log" onclick="logData()">Commit Audit</button>
        </div>
        <div id="history" style="margin-top: 30px; width: 100%;"></div>
    </div>

    <script>
        let currentKingdom = "Unknown";
        
        // Universal Biome Lexicon (The "Global Brain" Cache)
        const globalLexicon = {
            "Plantae": ["avocado", "mango", "bluegum", "oak", "mugumo", "mugaa", "acacia", "neem", "moringa", "willow", "cabbage", "kelp", "moss", "pine", "apple", "tree", "flora"],
            "Animalia": ["duck", "dove", "puffin", "sheep", "elephant", "lion", "whale", "bird", "fish", "insect", "fauna"]
        };

        function smartResolve() {
            const query = document.getElementById('assetSearch').value.toLowerCase();
            const kDisplay = document.getElementById('kingdomDisplay');
            if (query.length < 2) return;

            let found = false;
            for (const [kingdom, terms] of Object.entries(globalLexicon)) {
                if (terms.some(t => query.includes(t))) {
                    currentKingdom = kingdom;
                    kDisplay.innerText = (kingdom === 'Plantae' ? '🌿 ' : '🐾 ') + kingdom;
                    found = true;
                    break;
                }
            }

            if (!found) {
                kDisplay.innerText = "Querying Global Cloud...";
                fetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(query)}`)
                    .then(r => r.json()).then(data => {
                        if (data.kingdom) {
                            currentKingdom = data.kingdom;
                            kDisplay.innerText = (data.kingdom === 'Plantae' ? '🌿 ' : '🐾 ') + data.kingdom;
                        }
                    });
            }
            calculate();
        }

        function calculate() {
            const val = document.getElementById('inputVal').value;
            const output = document.getElementById('output');
            if (val > 0) {
                let res = (currentKingdom === "Plantae") 
                    ? (0.11 * Math.pow(val, 2.62)) * 0.5 * 3.66 
                    : "Biodiversity Unit";
                output.innerText = (typeof res === 'number') ? res.toFixed(2) : res;
            }
        }

        function logData() {
            const val = document.getElementById('output').innerText;
            const asset = document.getElementById('assetSearch').value;
            navigator.geolocation.getCurrentPosition((pos) => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<b>${asset}</b><br>Result: ${val}<br><small>GPS: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}</small>`;
                document.getElementById('history').prepend(item);
            });
        }
    </script>
</body>
</html>
