<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngaSafi | Field Auditor</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --emerald: #064E3B; --leaf: #10B981; --cream: #F9FAFB; }
        body { background: radial-gradient(circle at center, #065F46, var(--emerald)); color: var(--cream); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { padding: 2rem; width: 90%; max-width: 450px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 3rem; margin: 0; line-height: 1; }
        
        /* The Missing Slogan - Forced Visibility */
        .slogan { 
            display: block !important;
            font-size: 1.1rem; 
            color: var(--leaf); 
            letter-spacing: 0.5px; 
            margin: 15px 0 25px 0; 
            font-weight: 600; 
            font-style: italic;
            border-top: 1px solid rgba(212,175,55,0.3);
            padding-top: 10px;
        }

        .card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(12px); border: 1.5px solid var(--gold); padding: 1.5rem; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        input { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(0,0,0,0.2); color: white; font-size: 1.3rem; margin-top: 10px; text-align: center; }
        .btn-log { background: var(--gold); color: var(--emerald); border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        
        .result-area { margin-top: 25px; padding: 15px; background: rgba(16, 185, 129, 0.1); border-radius: 15px; }
        .value { font-size: 2.8rem; color: var(--gold); font-weight: 700; display: block; }
        .history { margin-top: 40px; text-align: left; width: 100%; }
        .log-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.85rem; border-left: 4px solid var(--gold); }
    </style>
</head>
<body>
    <div class="container">
        <h1>AngaSafi</h1>
        <p class="slogan">Ancestral Wisdom, Digitally Scaled.</p>
        
        <div class="card">
            <p style="font-size: 0.8rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; margin:0;">Tree Diameter (cm)</p>
            <input type="number" id="dbh" placeholder="0.0" oninput="calculate()">
            
            <div class="result-area">
                <span style="font-size: 0.7rem; text-transform: uppercase; opacity: 0.7;">Carbon Sequestered</span>
                <span id="output" class="value">0.00</span>
                <span style="font-size: 0.9rem; color: var(--leaf); font-weight: 600;">kg CO2e</span>
            </div>
            
            <button class="btn-log" onclick="logData()">Record Field Audit</button>
        </div>

        <div class="history" id="history">
            <p style="color: var(--gold); font-weight: bold; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 5px;">Field Audit Trail</p>
        </div>
    </div>

    <script>
        function calculate() {
            const dbh = document.getElementById('dbh').value;
            // Native Allometric Logic: Biomass = 0.11 * (DBH^2.62)
            const res = (0.11 * Math.pow(dbh, 2.62)) * 0.5 * 3.66;
            document.getElementById('output').innerText = dbh > 0 ? res.toFixed(2) : "0.00";
        }

        function logData() {
            const dbh = document.getElementById('dbh').value;
            const co2 = document.getElementById('output').innerText;
            if (dbh <= 0) return;

            navigator.geolocation.getCurrentPosition((pos) => {
                const log = {
                    date: new Date().toLocaleTimeString(),
                    coords: `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`,
                    val: co2
                };
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<b>${log.date}</b> • GPS: ${log.coords}<br><b>${log.val} kg CO2e</b> Captured`;
                document.getElementById('history').prepend(item);
            }, () => alert("GPS Permission Denied. Field Audit requires location truth."));
        }
    </script>
</body>
</html>
